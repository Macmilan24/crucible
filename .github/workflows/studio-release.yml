name: Studio Release

# Build the Crucible Studio desktop app for macOS / Windows / Linux and attach the
# installers to the GitHub Release for the tag. On macOS/Linux it also freezes the
# crucible runtime into a bundled sidecar, so the installer is a true one-download
# app (no Python or Crucible Core needed). GitHub's runners do the Rust compile, so
# no one needs Rust locally to ship or to use the app.
#
# NOTE: the sidecar freeze (PyInstaller + llama-cpp-python) is validated by the first
# real tag run; it may need per-OS tuning. Windows currently ships without the sidecar
# (it falls back to a `crucible` CLI on PATH) until a Windows freeze is added.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  studio:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            sidecar: true
          - platform: macos-13
            sidecar: true
          - platform: ubuntu-22.04
            sidecar: true
          - platform: windows-latest
            sidecar: false
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: studio/src-tauri

      # --- Freeze the crucible runtime into a bundled sidecar (macOS / Linux) ---
      - uses: actions/setup-python@v5
        if: matrix.sidecar
        with:
          python-version: "3.11"
      - name: Install uv
        if: matrix.sidecar
        uses: astral-sh/setup-uv@v5
      - name: Build crucible sidecar
        if: matrix.sidecar
        run: bash studio/scripts/build-sidecar.sh

      - name: Install frontend dependencies
        working-directory: studio
        run: npm ci

      - name: Build app + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: studio
          tagName: ${{ github.ref_name }}
          releaseName: "Crucible ${{ github.ref_name }}"
          releaseBody: "Crucible Studio desktop installers are attached below, alongside the Python wheelhouse."
          releaseDraft: false
          prerelease: false
          # Bundle the sidecar on platforms that built one. Inline JSON keeps the
          # externalBin path resolving relative to src-tauri regardless of cwd.
          args: ${{ matrix.sidecar && '--config {"bundle":{"externalBin":["binaries/crucible-server"]}}' || '' }}
