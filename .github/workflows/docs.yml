name: Deploy docs
on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'

# Gives the action permission to push the built HTML to the gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
        
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
            
      - name: Install dependencies
        run: pip install -r website/requirements.txt
        
      - name: Deploy Docs
        # Note the --config-file flag ensures it looks inside your website/ directory
        run: mkdocs gh-deploy --force --config-file website/mkdocs.yml