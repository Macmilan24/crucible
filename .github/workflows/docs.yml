name: Docs

# Build the MkDocs site and publish it to GitHub Pages.
# One-time setup in the repo: Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

# Least privilege needed to deploy Pages from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; never cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache mkdocs-material assets
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('website/requirements.txt') }}
          path: .cache
          restore-keys: mkdocs-material-

      - name: Install MkDocs Material
        run: pip install -r website/requirements.txt

      - name: Build site (strict — broken links fail the build)
        run: mkdocs build --strict -f website/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
