[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "crucible-memory"
version = "0.0.1"
description = "Three-tier memory (working/episodic/semantic) + sleep-time consolidation (STC) (P4)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Samuel Dagne" }]
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/crucible_memory"]
