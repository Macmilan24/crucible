[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "crucible-engine"
version = "0.1.0"
description = "The inference-native control-surface contract and SGLang integration — the orchestrator↔engine boundary (the wall)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Samuel Dagne" }]
dependencies = []

[project.optional-dependencies]
# The Mac/Apple-Silicon engine backend (real, runs today). ADR-0003: engine access
# is isolated here, so this is an additive backend, not a rewrite.
llama = ["llama-cpp-python>=0.3.2"]
# The paper's engine-of-record, for when a CUDA GPU is available (deferred):
# cuda = ["sglang>=...", "torch>=...", "xgrammar>=..."]

[tool.hatch.build.targets.wheel]
packages = ["src/crucible_engine"]
